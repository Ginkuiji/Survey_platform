services:
  db:
    image: postgres:16-alpine
    container_name: survey_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey_user -d survey_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./survey_platform
    container_name: survey_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    command: >
      gunicorn survey_platform.wsgi:application
      --bind 0.0.0.0:8000
      --workers 3
      --timeout 120

  frontend:
    build:
      context: ./survey_frontend
      args:
        VITE_API_URL: /api
    container_name: survey_frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    container_name: survey_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  static_volume:
  media_volume: